<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Secure HTML Exam Portal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.0.4">
    <script>
        // Inline blocker to load theme before document paints to prevent flicker
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>
    <script>
        // Apply theme to body
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    </script>

    <div class="container">
        <!-- Floating Apple Header Navigation -->
        <header class="glass-card apple-navbar mb-4" style="padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 20px; z-index: 100;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NEMS Logo" class="navbar-logo">
                <h2 style="font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.015em; color: var(--text-primary);">NEMS</h2>
            </div>
            
            <nav style="display: flex; gap: 20px; align-items: center;">
                {% if g.student %}
                    <span style="font-size: 14px; color: var(--text-secondary);">
                        Candidate: <strong>{{ g.student.name }}</strong>
                    </span>
                    <a href="{{ url_for('logout') }}" class="btn-secondary" style="padding: 8px 18px; font-size: 13px; border-radius: 980px;">Logout</a>
                {% elif g.admin %}
                    <span style="font-size: 14px; color: var(--text-secondary);">
                        Administrator
                    </span>
                    <a href="{{ url_for('logout') }}" class="btn-secondary" style="padding: 8px 18px; font-size: 13px; border-radius: 980px;">Logout</a>
                {% else %}
                    <a href="{{ url_for('index') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500;">Student Login</a>
                    <span style="color: var(--card-border);">|</span>
                    <a href="{{ url_for('admin_login') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500;">Admin Portal</a>
                {% endif %}
                
                <span style="color: var(--card-border);">|</span>
                
                <!-- Apple Style Theme Toggler -->
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle visual theme">
                    <svg id="theme-icon-moon" class="d-none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </nav>
        </header>

        <!-- Dynamic Content Area -->
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <!-- Footer -->
        <footer style="text-align: center; margin-top: 56px; padding: 24px; font-size: 12px; color: var(--text-muted); font-weight: 400;">
            <p>&copy; 2026 Secure & Monitored. Nxt Wave | Examination Authority</p>
        </footer>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Client-side theme switching logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('theme-icon-moon');
        const sunIcon = document.getElementById('theme-icon-sun');

        function updateThemeControls() {
            const isLight = document.body.classList.contains('light-theme');
            if (isLight) {
                sunIcon.classList.add('d-none');
                moonIcon.classList.remove('d-none');
            } else {
                moonIcon.classList.add('d-none');
                sunIcon.classList.remove('d-none');
            }
        }

        // Run sync on load
        updateThemeControls();

        themeToggleBtn.addEventListener('click', () => {
            const willBeLight = !document.body.classList.contains('light-theme');
            if (willBeLight) {
                document.body.classList.add('light-theme');
                document.documentElement.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-theme');
                document.documentElement.classList.remove('light-theme');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeControls();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
