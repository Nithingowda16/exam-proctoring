{% extends 'base.html' %}

{% block title %}Administrator Login - Secure Access{% endblock %}

{% block content %}
<div class="auth-container glass-card">
    <div style="text-align: center; margin-bottom: 24px;">
        <h2 style="font-size: 22px;">Administrator Portal</h2>
        <p style="color: var(--text-secondary); font-size: 13px; margin-top: 4px;">Secure management console access</p>
    </div>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('admin_login') }}" method="POST">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="admin" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Login as Administrator</button>
    </form>
</div>
{% endblock %}
